<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamlit AR</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'SF Pro Display', -apple-system, sans-serif;
      color: #fff;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #launch-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .launch-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 8px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      max-width: 280px;
      line-height: 1.5;
    }
    #enter-ar-btn {
      padding: 14px 40px;
      font-size: 17px;
      font-weight: 600;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
    }
    #enter-ar-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .status-msg { font-size: 13px; color: rgba(255,255,255,0.4); min-height: 20px; }
    .status-msg.error { color: #f87171; }
    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 320px;
    }
    .url-row label { font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; }
    .url-row input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: 'SF Mono', monospace;
    }
    #ar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      flex-direction: column;
    }
    #ar-overlay iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
    #controls-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(10, 10, 20, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 8px 16px;
      backdrop-filter: blur(12px);
      z-index: 999;
      white-space: nowrap;
    }
    #controls-bar label { font-size: 12px; color: rgba(255,255,255,0.5); }
    #opacity-slider {
      -webkit-appearance: none;
      width: 100px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
    }
    #opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #7c3aed;
      cursor: pointer;
    }
    #opacity-value { font-size: 12px; color: rgba(255,255,255,0.6); width: 32px; text-align: right; }
    .ctrl-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    #exit-btn {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="launch-screen">
    <div class="launch-icon">📊</div>
    <div><h1>Streamlit AR</h1></div>
    <p class="subtitle">Overlay your Streamlit app on the real world using Meta Quest passthrough.</p>
    <div class="url-row">
      <label>URL</label>
      <input id="streamlit-url" type="url" value="https://appartest-aa7d6cjghdbhkcujttgrza.streamlit.app/" spellcheck="false" />
    </div>
    <button id="enter-ar-btn">▶ Enter AR</button>
    <p class="status-msg" id="status-msg">Checking WebXR support…</p>
  </div>
  <div id="ar-overlay">
    <iframe id="streamlit-frame" src="" allow="fullscreen; camera; microphone"></iframe>
  </div>
  <div id="controls-bar" style="display:none;">
    <label>Opacity</label>
    <input type="range" id="opacity-slider" min="5" max="90" value="45" step="5" />
    <span id="opacity-value">45%</span>
    <div class="ctrl-divider"></div>
    <button id="exit-btn">✕ Exit AR</button>
  </div>
  <canvas id="xr-canvas" style="display:none; position:fixed; inset:0;"></canvas>

      if (!navigator.xr) { setStatus('WebXR is not available in this browser.', true); enterBtn.disabled = true; return; }
      try {
        const supported = await navigator.xr.isSessionSupported('immersive-ar');
        if (supported) { setStatus('Ready — tap Enter AR to begin.'); }
        else { setStatus('immersive-ar not supported on this device.', true); enterBtn.disabled = true; }
      } catch (e) { setStatus('Could not query AR support: ' + e.message, true); enterBtn.disabled = true; }
    }
